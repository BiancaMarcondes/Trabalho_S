<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena Royale | Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-overlay"></div>
    <audio id="bg-music" loop>
        <source src="assets/fighting_music.mp3" type="audio/mpeg">
    </audio>

    <div id="result-overlay" class="overlay hidden">
        <div class="result-content">
            <h2 id="result-text">VITÓRIA!</h2>
            <button id="overlay-reset-btn" class="btn">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <main id="app">
        <header>
            <div class="logo-small">BATTLE ARENA</div>
        </header>

        <!-- Selection Screen -->
        <section id="selection-screen" class="active">
            <h2 class="section-title">Escolha seu Herói</h2>
            <div id="character-grid" class="grid-container">
                <!-- Cards via JS -->
            </div>
            <footer class="credits">
                Música: "Fighting The Avanc" por Darren Curtis
            </footer>
        </section>

        <!-- Battle Screen -->
        <section id="battle-screen" class="hidden">
            <div class="arena-field">
                <!-- CPU Side -->
                <div class="fighter cpu" id="cpu-fighter">
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="c-hp-bar"></div>
                    </div>
                    <!-- CPU Elixir Bar -->
                    <div class="elixir-container cpu-elixir">
                        <div class="elixir-bar" id="cpu-elixir-bar"></div>
                    </div>
                    <div class="portrait-container">
                        <div class="shield-vfx"></div>
                        <img src="" alt="CPU" id="c-portrait" class="fighter-img">
                    </div>
                    <span class="fighter-name" id="c-name">CPU</span>
                </div>

                <!-- Player Side -->
                <div class="fighter player" id="player-fighter">
                    <span class="fighter-name" id="p-name">PLAYER</span>
                    <div class="portrait-container">
                        <div class="shield-vfx"></div>
                        <img src="" alt="Player" id="p-portrait" class="fighter-img">
                    </div>
                    <div class="hp-bar-container">
                        <div class="hp-bar" id="p-hp-bar"></div>
                    </div>
                </div>
            </div>

            <!-- Elixir System -->
            <div class="elixir-container">
                <div class="elixir-bar" id="elixir-bar"></div>
            </div>

            <div id="skills-container" class="hand-container">
                <!-- Skill Cards via JS -->
            </div>

            <!-- Missing IDs required by JS -->
            <div id="combat-log" class="hidden"></div>
            <button id="reset-btn" class="btn hidden">MENU</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
